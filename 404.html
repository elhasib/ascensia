<style>
  :root {
    --cream: #F5F0EB; --charcoal: #1E1714; --gold: #D4A853;
    --copper: #A67C68; --rose: #C4A491;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Outfit', system-ui, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--charcoal);
    color: var(--cream);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Ascending lines sculpture — large, background */
  .bg-sculpture {
    position: absolute;
    bottom: -20px; right: -20px;
    display: flex; flex-direction: column;
    gap: 18px; align-items: flex-end;
    pointer-events: none;
    opacity: 0.06;
  }
  .bg-sculpture span {
    display: block; height: 2px;
    background: var(--gold); border-radius: 1px;
  }

  /* Concentric ring */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 0.5px solid rgba(196,164,145,0.06);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    pointer-events: none;
  }

  .four-oh-four {
    font-family: var(--serif);
    font-size: clamp(120px, 22vw, 260px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.06em;
    color: rgba(196,164,145,0.08);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
  }

  .content { position: relative; z-index: 1; max-width: 560px; }

  /* Logo */
  .logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; justify-content: center;
    margin-bottom: 64px;
  }
  .logo-lines {
    display: flex; flex-direction: column;
    gap: 3.5px; align-items: flex-start;
  }
  .logo-lines span {
    display: block; height: 1.5px;
    background: var(--gold); border-radius: 1px;
  }
  .logo-wordmark {
    font-family: var(--serif); font-size: 14px;
    font-weight: 400; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--cream);
  }

  .eyebrow {
    font-size: 10px; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--copper);
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-bottom: 24px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ''; width: 20px; height: 0.5px;
    background: var(--copper); display: block;
  }

  h1 {
    font-family: var(--serif);
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
    color: var(--cream);
  }
  h1 em { font-style: italic; color: var(--gold); }

  p {
    font-size: 16px; font-weight: 300; line-height: 1.8;
    color: rgba(245,240,235,0.4);
    margin-bottom: 44px;
  }

  .home-link {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    text-decoration: none; color: var(--charcoal);
    background: var(--gold); padding: 14px 36px;
    border-radius: 1px; font-weight: 400;
    transition: background 0.2s;
    font-family: var(--sans);
  }
  .home-link:hover { background: var(--cream); }
  .home-link .arr { transition: transform 0.2s; }
  .home-link:hover .arr { transform: translateX(4px); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:none; }
  }
  .content > * {
    opacity: 0;
    animation: fadeUp 0.8s both;
  }
  .content .logo       { animation-delay: 0.1s; }
  .content .eyebrow    { animation-delay: 0.25s; }
  .content h1          { animation-delay: 0.4s; }
  .content p           { animation-delay: 0.55s; }
  .content .home-link  { animation-delay: 0.7s; }
